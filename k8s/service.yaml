apiVersion: v1
kind: Service
metadata:
  name: radiocontestwinner
  labels:
    app: radiocontestwinner
    version: v3.4
    component: audio-transcription
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
    description: "Radio Contest Winner audio transcription service"
spec:
  type: ClusterIP
  selector:
    app: radiocontestwinner
    component: audio-transcription
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  sessionAffinity: None